name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: ⬣ ESLint
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v7

      - name: ⎔ Setup node
        uses: actions/setup-node@v7
        with:
          cache: npm
          cache-dependency-path: ./package.json
          node-version: 24

      - name: 📥 Install deps
        run: npm install

      - name: 🔬 Lint
        run: npm run lint

  typecheck:
    name: 🔎 Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v7

      - name: ⎔ Setup node
        uses: actions/setup-node@v7
        with:
          cache: npm
          cache-dependency-path: ./package.json
          node-version: 24

      - name: 📥 Install deps
        run: npm install

      - name: 🔎 Typecheck
        run: npm run typecheck

  vitest:
    name: ⚡ Vitest
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v7

      - name: ⎔ Setup node
        uses: actions/setup-node@v7
        with:
          cache: npm
          cache-dependency-path: ./package.json
          node-version: 24

      - name: 📥 Install deps
        run: npm install

      - name: ⚡ Run vitest
        run: npm run test
